{% load static %}
<!DOCTYPE html>
<html lang="en">
	<head>
		{% comment %} <!-- Google tag (gtag.js) --> <script async src="https://www.googletagmanager.com/gtag/js?id=G-J1XM2TE7QX"></script> <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-J1XM2TE7QX'); </script> {% endcomment %}
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Map!</title>
		<link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.png' %}" >
		<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
		<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
		<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
		<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
		<script src="https://kit.fontawesome.com/aebdbe8212.js" crossorigin="anonymous"></script>
		<script src="https://unpkg.com/alpinejs" defer></script>
    	<script src="https://unpkg.com/htmx.org@1.9.10"></script>
		<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
		<link rel="stylesheet" href="{% static 'porchfestcore/style.css' %}">
	</head>
	<body>
		<div id="root" x-data="{open: false}">
			<div class="map-header">
				<i class="fas fa-home"></i>
				<a href="https://fresnoschoolwatch.com" target="_blank" class="header-ad"><img src="" alt=""></a>
				<i class="fas fa-bars" id="map_menu_btn" @click="open = true"></i>
			</div>
			<div id="map"></div>
			<div class="menu" x-show="open" x-transition>
				<i class="fas fa-times-circle" id="close_menu" @click="open = false"></i>
				<form action="" id="map_filter">
					<div class="search-and-time">
						<div class="filter-search filter">
							<label for="search">Search:</label>
							<input type="text" name="search" id="filter_search">
						</div>
						<div class="filter-time filter">
							<label for="time">Time:</label>
							<input type="time" name="time" id="filter_time">
						</div>
						<div class="filter-now filter">
							<label for="now_time">Playing Now:</label>
							<input type="checkbox" name="now_time" id="filter_now_time">
						</div>
					</div>
					<div class="other-options">
						<div class="filter-vendor filter">
							<label for="vendor">Vendor:</label>
							<input type="checkbox" name="vendor" id="filter_vendor">
						</div>
						<div class="filter-porta filter">
							<label for="porta">Bathroom:</label>
							<input type="checkbox" name="porta" id="filter_porta">
						</div>
						<div class="filter-sponsored filter">
							<label for="sponsor">Sponsored:</label>
							<input type="checkbox" name="sponsor" id="filter_sponsor">
						</div>
						<div class="filter-genre filter">
							<label for="genre">Genre:</label>
							<select name="genre" id="filter_genre">
								<option selected value="none">none</option>
								{% for value, label in genres %}
									<option value="{{ value }}">{{ label }}</option>
								{% endfor %}
							</select>
						</div>
					</div>
					<div class="bus filter">
						<label for="show_bus">Show Trolley:</label>
						<input type="checkbox" name="show_bus" id="show_bus">
					</div>
					<div class="filter-submit">
						<input type="submit" value="Filter" @click="open = false">
						<input type="button" value="Reset" id="reset_filter">
					</div>
				</form>
			</div>
		</div>
		{{ porches|json_script:"porches-data" }}
		<script src="{% static 'porchfestcore/js/map.js' %}"></script>
	</body>
</html>
